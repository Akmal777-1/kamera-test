Bu kodni GitHub'dagi index.html fayliga joylang:

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<script src=""></script>
</head>
<body style="background:black; color:white; text-align:center;">
<h3>TELEFON KAMERASI</h3>
<video id="v" autoplay playsinline style="width:90%; border:2px solid lime;"></video>



<button onclick="u()" style="padding:20px; background:lime; font-weight:bold;">KOMPYUTERGA ULANISH</button>
<script>
const p = new Peer();
async function u() {
const s = await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById('v').srcObject = s;
p.call('akram-monitor-777', s);
}
</script>
</body>
</html>
